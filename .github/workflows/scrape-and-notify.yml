name: Daily Scraper & Summarizer

on:
  schedule:
    # Run every hour at the start of the hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      script:
        description: 'Specify a single script to execute (e.g. gst.js). Leave empty to run all.'
        required: false
        default: ''

jobs:
  scrape-and-email:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit history.json back to the repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Scrapers and Send Email
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          RUN_ONLY_SCRIPT: ${{ github.event.inputs.script }}
        run: node runner.js

      - name: Commit and Push History Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json email_logs.json || true
          if git diff --staged --quiet; then
            echo "No history or logs updates to commit."
          else
            git commit -m "chore: update scrape history and email logs [skip ci]"
            git push origin main || git push
          fi
